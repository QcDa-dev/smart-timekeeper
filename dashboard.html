<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード | Smart TimeKeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <!-- ドラッグ＆ドロップ用ライブラリを追加 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <main class="py-8 px-4 sm:px-6 max-w-6xl mx-auto w-full">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">ダッシュボード</h1>
                <p id="welcome-message" class="text-slate-500 text-sm mt-1">読み込み中...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='format.html'" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg shadow-sm hover:bg-slate-50 transition">
                    フォーマットを作成
                </button>
                <button onclick="window.location.href='create.html'" class="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg shadow-sm hover:bg-blue-700 transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    会議を始める
                </button>
            </div>
        </div>

        <div id="loading-indicator" class="flex justify-center items-center py-20">
            <div class="loader"></div>
        </div>

        <div id="dashboard-content" class="grid md:grid-cols-2 gap-8 hidden">
            <!-- フォーマット一覧 -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-teal-600">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                        </svg>
                        保存済みのフォーマット
                    </h2>
                </div>
                <div id="formats-list" class="space-y-3">
                    <!-- JSで動的に追加されます -->
                </div>
            </section>

            <!-- 会議履歴一覧 -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-amber-600">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                        最近の会議記録
                    </h2>
                </div>
                <div id="records-list" class="space-y-3">
                    <!-- JSで動的に追加されます -->
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, authGuard, db } from './common.js';
        import { collection, getDocs, query, orderBy, limit, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initCommonUI("Smart TimeKeeper");
            currentUser = await authGuard(true, 'login.html');
            if (!currentUser) return;

            document.getElementById('welcome-message').textContent = `ようこそ、${currentUser.displayName || 'ユーザー'}さん`;

            // グローバルに編集・削除関数を公開（インラインonclickから呼ぶため）
            window.deleteRecord = deleteRecord;
            window.editRecord = editRecord;

            await loadDashboardData(currentUser.uid);
        });

        async function loadDashboardData(uid) {
            const loadingIndicator = document.getElementById('loading-indicator');
            const dashboardContent = document.getElementById('dashboard-content');
            const formatsList = document.getElementById('formats-list');
            const recordsList = document.getElementById('records-list');

            try {
                // フォーマット一覧の取得 (formatsコレクションへ変更)
                const formatsRef = collection(db, `users/${uid}/formats`);
                const formatsSnap = await getDocs(formatsRef);
                
                formatsList.innerHTML = '';
                if (formatsSnap.empty) {
                    formatsList.innerHTML = '<p class="text-slate-400 text-sm p-4 text-center bg-slate-50 rounded-lg">フォーマットはまだありません</p>';
                } else {
                    // 並び順(order)でソート
                    const formatsData = [];
                    formatsSnap.forEach(doc => formatsData.push({ id: doc.id, ...doc.data() }));
                    formatsData.sort((a, b) => (a.order || 0) - (b.order || 0));

                    formatsData.forEach(data => {
                        formatsList.appendChild(createFormatCard(data.id, data));
                    });

                    // ドラッグ＆ドロップ初期化
                    initFormatSortable();
                }

                // 会議履歴の取得 (最新10件に変更)
                const recordsRef = collection(db, `users/${uid}/records`);
                const q = query(recordsRef, orderBy("createdAt", "desc"), limit(10));
                const recordsSnap = await getDocs(q).catch(() => null); 
                
                recordsList.innerHTML = '';
                if (!recordsSnap || recordsSnap.empty) {
                    recordsList.innerHTML = '<p class="text-slate-400 text-sm p-4 text-center bg-slate-50 rounded-lg">会議記録はまだありません</p>';
                } else {
                    recordsSnap.forEach(document => {
                        const data = document.data();
                        recordsList.appendChild(createRecordCard(document.id, data));
                    });
                }

            } catch (error) {
                console.error("データの取得に失敗しました:", error);
                alert("データの読み込み中にエラーが発生しました。");
            } finally {
                loadingIndicator.classList.add('hidden');
                dashboardContent.classList.remove('hidden');
            }
        }

        function initFormatSortable() {
            const list = document.getElementById('formats-list');
            Sortable.create(list, {
                handle: '.drag-handle',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: () => {
                    // 並び替え後に順番を保存
                    const items = list.querySelectorAll('.format-card-item');
                    items.forEach((item, index) => {
                        const id = item.dataset.id;
                        updateDoc(doc(db, `users/${currentUser.uid}/formats`, id), { order: index }).catch(e => console.error(e));
                    });
                }
            });
        }

        // フォーマットカードのUI生成
        function createFormatCard(id, data) {
            const div = document.createElement('div');
            // drag-handle と data-id を追加
            div.className = 'format-card-item flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition group cursor-pointer bg-white';
            div.dataset.id = id;
            div.onclick = (e) => {
                if(!e.target.closest('button') && !e.target.closest('.drag-handle')) {
                    window.location.href = `format.html?id=${id}`;
                }
            };

            const totalTime = data.items ? data.items.reduce((sum, item) => sum + parseInt(item.time || 0), 0) : 0;
            const itemCount = data.items ? data.items.length : 0;

            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="drag-handle text-slate-300 hover:text-slate-500 cursor-grab active:cursor-grabbing p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">${escapeHtml(data.name || '無題のフォーマット')}</h3>
                        <p class="text-xs text-slate-500 mt-1">合計: ${totalTime}分 / ${itemCount}項目</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.location.href='create.html?formatId=${id}'" class="px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition">
                        会議開始
                    </button>
                    <button onclick="window.location.href='format.html?id=${id}'" class="p-1.5 text-slate-400 hover:text-slate-600 rounded-lg transition" title="編集">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
                    </button>
                </div>
            `;
            return div;
        }

        // 会議履歴カードのUI生成
        function createRecordCard(id, data) {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition cursor-pointer';
            div.onclick = (e) => { 
                if(!e.target.closest('button')) {
                    window.location.href = `history.html?id=${id}`; 
                }
            };

            const dateStr = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }) : '日付不明';
            const safeName = escapeHtml(data.name || '無題の会議');

            div.innerHTML = `
                <div>
                    <h3 class="font-bold text-slate-800">${safeName}</h3>
                    <p class="text-xs text-slate-500 mt-1">${dateStr}</p>
                </div>
                <div class="flex gap-1">
                    <button onclick="editRecord(event, '${id}', '${safeName}')" class="p-1.5 text-slate-400 hover:text-blue-600 rounded-lg transition" title="会議名を変更">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
                    </button>
                    <button onclick="deleteRecord(event, '${id}')" class="p-1.5 text-slate-400 hover:text-red-600 rounded-lg transition" title="履歴を削除">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.158 3.21c-1.39.2-2.8.3-4.21.3a59.14 59.14 0 0 1-4.21-.3m-10.25 0c.342-.052.682-.107 1.022-.166m10.25 0V5.625c0-1.084-.91-1.96-2.04-1.96h-2.1c-1.13 0-2.04.876-2.04 1.96v.15m7.5 0h-5.25" /></svg>
                    </button>
                    <button class="p-1.5 text-slate-400 ml-1 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
                    </button>
                </div>
            `;
            return div;
        }

        // 会議履歴の削除
        async function deleteRecord(e, id) {
            e.stopPropagation();
            if(!confirm("この会議記録を削除しますか？（この操作は取り消せません）")) return;
            try {
                await deleteDoc(doc(db, `users/${currentUser.uid}/records`, id));
                // 画面を再読み込みしてリストを更新
                loadDashboardData(currentUser.uid);
            } catch (error) {
                console.error("削除エラー:", error);
                alert("削除に失敗しました。");
            }
        }

        // 会議履歴名の編集
        async function editRecord(e, id, currentName) {
            e.stopPropagation();
            const newName = prompt("新しい会議名を入力してください", currentName);
            if(newName === null || newName.trim() === "" || newName === currentName) return;
            
            try {
                await updateDoc(doc(db, `users/${currentUser.uid}/records`, id), {
                    name: newName.trim()
                });
                loadDashboardData(currentUser.uid);
            } catch (error) {
                console.error("更新エラー:", error);
                alert("会議名の更新に失敗しました。");
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return escape[match];
            });
        }
    </script>
</body>
</html>
