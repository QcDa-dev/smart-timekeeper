<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード | Smart TimeKeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <style>
        /* ローディングスピナー */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <main class="py-8 px-4 sm:px-6 max-w-6xl mx-auto w-full">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">ダッシュボード</h1>
                <p id="welcome-message" class="text-slate-500 text-sm mt-1">読み込み中...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="window.location.href='template.html'" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg shadow-sm hover:bg-slate-50 transition">
                    ひな形を作成
                </button>
                <button onclick="window.location.href='create.html'" class="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg shadow-sm hover:bg-blue-700 transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    新しい会議を始める
                </button>
            </div>
        </div>

        <div id="loading-indicator" class="flex justify-center items-center py-20">
            <div class="loader"></div>
        </div>

        <div id="dashboard-content" class="grid md:grid-cols-2 gap-8 hidden">
            <!-- ひな形一覧 -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-teal-600">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                        </svg>
                        保存済みのひな形
                    </h2>
                </div>
                <div id="templates-list" class="space-y-3">
                    <!-- JSで動的に追加されます -->
                </div>
            </section>

            <!-- 会議履歴一覧 -->
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-amber-600">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                        最近の会議記録
                    </h2>
                </div>
                <div id="records-list" class="space-y-3">
                    <!-- JSで動的に追加されます -->
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, authGuard, db } from './common.js';
        import { collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        document.addEventListener('DOMContentLoaded', async () => {
            initCommonUI("Smart TimeKeeper");
            
            // ログインチェック (未ログイン時は login.html へ)
            const user = await authGuard(true, 'login.html');
            if (!user) return;

            document.getElementById('welcome-message').textContent = `ようこそ、${user.displayName || 'ユーザー'}さん`;

            await loadDashboardData(user.uid);
        });

        async function loadDashboardData(uid) {
            const loadingIndicator = document.getElementById('loading-indicator');
            const dashboardContent = document.getElementById('dashboard-content');
            const templatesList = document.getElementById('templates-list');
            const recordsList = document.getElementById('records-list');

            try {
                // ひな形一覧の取得
                const templatesRef = collection(db, `users/${uid}/templates`);
                // 作成日時等でソートする場合はqueryを追加しますが、今回は全件取得
                const templatesSnap = await getDocs(templatesRef);
                
                templatesList.innerHTML = '';
                if (templatesSnap.empty) {
                    templatesList.innerHTML = '<p class="text-slate-400 text-sm p-4 text-center bg-slate-50 rounded-lg">ひな形はまだありません</p>';
                } else {
                    templatesSnap.forEach(doc => {
                        const data = doc.data();
                        templatesList.appendChild(createTemplateCard(doc.id, data));
                    });
                }

                // 会議履歴の取得 (最新5件)
                const recordsRef = collection(db, `users/${uid}/records`);
                // ※ createdAt でインデックスが必要になる場合があります
                const q = query(recordsRef, orderBy("createdAt", "desc"), limit(5));
                const recordsSnap = await getDocs(q).catch(() => null); // インデックスエラー回避の簡易フォールバック
                
                recordsList.innerHTML = '';
                if (!recordsSnap || recordsSnap.empty) {
                    recordsList.innerHTML = '<p class="text-slate-400 text-sm p-4 text-center bg-slate-50 rounded-lg">会議記録はまだありません</p>';
                } else {
                    recordsSnap.forEach(doc => {
                        const data = doc.data();
                        recordsList.appendChild(createRecordCard(doc.id, data));
                    });
                }

            } catch (error) {
                console.error("データの取得に失敗しました:", error);
                alert("データの読み込み中にエラーが発生しました。");
            } finally {
                loadingIndicator.classList.add('hidden');
                dashboardContent.classList.remove('hidden');
            }
        }

        // ひな形カードのUI生成
        function createTemplateCard(id, data) {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition group cursor-pointer';
            // カード全体をクリックしたら編集画面へ（後々、「このひな形で会議開始」ボタンも追加可能）
            div.onclick = (e) => {
                if(!e.target.closest('button')) {
                    window.location.href = `template.html?id=${id}`;
                }
            };

            const totalTime = data.items ? data.items.reduce((sum, item) => sum + parseInt(item.time || 0), 0) : 0;
            const itemCount = data.items ? data.items.length : 0;

            div.innerHTML = `
                <div>
                    <h3 class="font-bold text-slate-800">${escapeHtml(data.name || '無題のひな形')}</h3>
                    <p class="text-xs text-slate-500 mt-1">合計: ${totalTime}分 / ${itemCount}項目</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.location.href='create.html?templateId=${id}'" class="px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition">
                        会議開始
                    </button>
                    <button onclick="window.location.href='template.html?id=${id}'" class="p-1.5 text-slate-400 hover:text-slate-600 rounded-lg transition">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
                    </button>
                </div>
            `;
            return div;
        }

        // 会議履歴カードのUI生成
        function createRecordCard(id, data) {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition cursor-pointer';
            div.onclick = () => { window.location.href = `history.html?id=${id}`; };

            // 日付のフォーマット
            const dateStr = data.createdAt ? new Date(data.createdAt.toMillis()).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' }) : '日付不明';

            div.innerHTML = `
                <div>
                    <h3 class="font-bold text-slate-800">${escapeHtml(data.name || '無題の会議')}</h3>
                    <p class="text-xs text-slate-500 mt-1">${dateStr}</p>
                </div>
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-400">
                      <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                    </svg>
                </div>
            `;
            return div;
        }

        // XSS対策用
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return escape[match];
            });
        }
    </script>
</body>
</html>
