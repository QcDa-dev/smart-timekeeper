<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リリースノート | Smart TimeKeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <!-- マークダウンをHTMLに変換するためのライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* リリースノート用のスタイル */
        .release-content h1, .release-content h2, .release-content h3 { 
            font-weight: 700; 
            margin-top: 1rem; 
            margin-bottom: 0.5rem; 
            color: #1e293b;
        }
        .release-content h2 { font-size: 1.25rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.25rem; }
        .release-content ul { list-style-type: disc; list-style-position: inside; margin-left: 1rem; margin-bottom: 1rem; }
        .release-content li { margin-bottom: 0.25rem; color: #475569; font-size: 0.875rem; }
        .release-content p { margin-bottom: 0.75rem; color: #475569; font-size: 0.875rem; line-height: 1.6; }
        .release-content a { color: #2563eb; text-decoration: underline; }
    </style>
</head>
<body class="bg-slate-50">

    <main class="py-8 px-4 sm:px-6 max-w-4xl mx-auto w-full">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800">リリースノート</h1>
            <p class="text-slate-500 mt-2 text-sm">Smart TimeKeeperのアップデート履歴</p>
        </header>

        <div id="loading-indicator" class="flex justify-center items-center py-10">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <span class="ml-3 text-slate-500 text-sm">情報を取得中...</span>
        </div>

        <div id="release-notes-container" class="space-y-6">
            <!-- JavaScriptでGitHub APIから取得した内容が挿入されます -->
        </div>

        <div id="error-message" class="hidden bg-red-50 text-red-600 p-4 rounded-xl border border-red-100 text-center text-sm">
            リリース情報の取得に失敗しました。<br>（まだGitHub上にリリースが作成されていない可能性があります）
        </div>
    </main>

    <script type="module">
        import { initCommonUI } from './common.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI("Smart TimeKeeper");
            fetchReleaseNotes();
        });

        function fetchReleaseNotes() {
            // ★重要: GitHubのリポジトリ情報に合わせて以下を変更してください
            const GITHUB_USER = 'qcda-dev';
            const GITHUB_REPO = 'smart-timekeeper'; // リポジトリ名を適切なものに変更してください

            const container = document.getElementById('release-notes-container');
            const loading = document.getElementById('loading-indicator');
            const errorMsg = document.getElementById('error-message');

            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(releases => {
                    loading.classList.add('hidden');
                    
                    if (releases.length === 0) {
                        container.innerHTML = `
                            <div class="bg-white p-6 rounded-xl border border-slate-200 text-center text-slate-500">
                                まだリリース情報はありません。（v1.0.0 リリース準備中）
                            </div>`;
                        return;
                    }

                    releases.forEach(release => {
                        const date = new Date(release.published_at).toLocaleDateString('ja-JP', {
                            year: 'numeric', month: 'long', day: 'numeric'
                        });
                        
                        const div = document.createElement('div');
                        div.className = 'bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200';
                        
                        // marked.js を使ってMarkdownをHTMLに変換
                        const bodyHtml = marked.parse(release.body || '（詳細なし）');

                        div.innerHTML = `
                            <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-4 pb-4 border-b border-slate-100 gap-2">
                                <h2 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                                      <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
                                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z" />
                                    </svg>
                                    ${escapeHtml(release.name || release.tag_name)}
                                </h2>
                                <span class="text-sm font-medium text-slate-400">${date}</span>
                            </div>
                            <div class="release-content">
                                ${bodyHtml}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    loading.classList.add('hidden');
                    // 開発中のリポジトリ未作成状態を考慮し、フェイクデータを表示するフォールバック
                    showFallbackData();
                });
        }

        function showFallbackData() {
            const container = document.getElementById('release-notes-container');
            const div = document.createElement('div');
            div.className = 'bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200';
            div.innerHTML = `
                <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-4 pb-4 border-b border-slate-100 gap-2">
                    <h2 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z" />
                        </svg>
                        v1.0.0 (Initial Release)
                    </h2>
                    <span class="text-sm font-medium text-slate-400">公開予定</span>
                </div>
                <div class="release-content">
                    <p>Smart TimeKeeper の最初のバージョンをリリースしました。</p>
                    <ul>
                        <li>アジェンダのひな形作成機能</li>
                        <li>自動時間再配分（Flex/Fix）を備えたタイマー機能</li>
                        <li>会議結果の履歴と振り返り機能</li>
                    </ul>
                    <p class="text-xs text-red-400 mt-4">※この表示はGitHubリポジトリ連携前のプレビュー用です。</p>
                </div>
            `;
            container.appendChild(div);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return escape[match];
            });
        }
    </script>
</body>
</html>
