<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイマー実行中 | Smart TimeKeeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <style>
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .timer-over { color: #ef4444; } 
        .timer-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
</head>
<body class="bg-slate-50 relative">

    <!-- ▼ 開始前待機オーバーレイ ▼ -->
    <div id="start-overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="text-center p-8 bg-white rounded-2xl shadow-xl border border-slate-100 max-w-md mx-4">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">会議の準備が整いました</h2>
            <p class="text-slate-500 mb-8">開始予定時刻: <span id="overlay-start-time" class="font-bold text-slate-700">--:--</span></p>
            <button id="manual-start-btn" class="w-full px-8 py-4 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
                </svg>
                今すぐ会議を開始する
            </button>
        </div>
    </div>

    <main class="py-6 px-4 sm:px-6 max-w-4xl mx-auto w-full flex flex-col h-screen">
        
        <!-- ヘッダー情報（会議名・時刻） -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 id="meeting-title" class="text-xl font-bold text-slate-800 truncate w-full sm:w-auto">会議を読み込み中...</h1>
            <div class="flex flex-wrap gap-4 sm:gap-6 text-sm font-medium w-full sm:w-auto justify-between sm:justify-end">
                <div class="text-center">
                    <p class="text-slate-400 text-xs">開始予定</p>
                    <p id="meeting-start-time" class="text-slate-700">--:--</p>
                </div>
                <div class="text-center border-l pl-4 border-slate-200">
                    <p class="text-slate-400 text-xs">実際の開始</p>
                    <p id="actual-start-time" class="text-slate-700">--:--</p>
                </div>
                <div class="text-center border-l pl-4 border-slate-200">
                    <p class="text-slate-400 text-xs">当初の終了予定</p>
                    <p id="original-end-time" class="text-slate-700">--:--</p>
                </div>
                <div class="text-center border-l pl-4 border-slate-200">
                    <p id="current-end-label" class="text-slate-400 text-xs">現在の終了予定</p>
                    <p id="current-end-time" class="text-blue-600 font-bold text-lg leading-none">--:--</p>
                </div>
            </div>
        </div>

        <!-- アラート領域 -->
        <div id="alert-banner" class="hidden bg-red-100 text-red-700 p-3 rounded-lg text-sm font-bold text-center mb-4 transition-all duration-300">
            時間超過：未実施項目の時間を削りきれないため、終了予定時刻が延長されています。
        </div>

        <!-- メインタイマー領域 -->
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-4 text-center flex-grow flex flex-col justify-center relative">
            <button id="force-finish-btn" class="absolute top-4 right-4 px-3 py-2 bg-red-50 text-red-600 text-sm font-bold rounded-lg hover:bg-red-100 transition flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1 0 12.728 0M12 3v9" />
                </svg>
                強制終了
            </button>

            <h2 class="text-sm font-bold text-slate-400 mb-2 uppercase tracking-widest mt-6">現在進行中の議題</h2>
            <div id="current-item-name" class="text-2xl sm:text-3xl font-bold text-slate-800 mb-6 min-h-[40px]">
                --
            </div>
            
            <div id="timer-display" class="font-mono text-7xl sm:text-9xl font-bold text-slate-800 mb-8 tracking-tighter">
                00:00
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button id="pause-btn" class="px-6 py-4 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition min-w-[120px]">
                    一時停止
                </button>
                <button id="next-btn" class="px-8 py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    完了・次へ
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- 今後のアジェンダリスト -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex-grow overflow-y-auto max-h-64">
            <h3 class="text-sm font-bold text-slate-500 mb-4">今後のスケジュール（動的調整後）</h3>
            <div id="upcoming-list" class="space-y-2">
                <!-- JSで動的生成 -->
            </div>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, authGuard, db } from './common.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let recordId = null;
        let meetingData = null;
        
        let currentIndex = 0;
        let timerInterval = null;
        let elapsedSecondsCurrentItem = 0;
        let isPaused = false;

        let originalTotalSec = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            initCommonUI("Smart TimeKeeper");
            currentUser = await authGuard(true, 'login.html');
            if (!currentUser) return;

            const urlParams = new URLSearchParams(window.location.search);
            recordId = urlParams.get('id');
            if (!recordId) {
                alert("会議データが見つかりません。");
                window.location.href = 'dashboard.html';
                return;
            }

            await loadMeetingData();
            setupEventListeners();
        });

        async function loadMeetingData() {
            try {
                const docRef = doc(db, `users/${currentUser.uid}/records`, recordId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    meetingData = docSnap.data();
                    document.getElementById('meeting-title').textContent = meetingData.name;
                    document.getElementById('meeting-start-time').textContent = meetingData.startTime;
                    
                    if (meetingData.actualStartTime) {
                        document.getElementById('actual-start-time').textContent = meetingData.actualStartTime;
                    }

                    originalTotalSec = meetingData.items.reduce((sum, item) => sum + (item.originalTimeMin * 60), 0);
                    
                    const startDt = parseTimeStr(meetingData.startTime);
                    const originalEndDt = new Date(startDt.getTime() + originalTotalSec * 1000);
                    document.getElementById('original-end-time').textContent = formatTimeStr(originalEndDt);
                    
                    // 開始前待機判定
                    const now = new Date();
                    // 秒以下を切り捨てて分単位で比較
                    const currentTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), 0, 0);
                    
                    if (meetingData.status === 'created' && currentTime < startDt) {
                        // 開始時刻前なら待機オーバーレイを表示
                        document.getElementById('overlay-start-time').textContent = meetingData.startTime;
                        document.getElementById('start-overlay').classList.remove('hidden');
                        
                        // 仮の終了時刻（実際の開始がまだなので予定時刻から計算）を表示
                        document.getElementById('current-end-time').textContent = formatTimeStr(originalEndDt);
                    } else {
                        // 既に時刻を過ぎている or 再開の場合はすぐスタート
                        startTimer();
                    }
                } else {
                    alert("会議データが存在しません。");
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                console.error("読み込みエラー:", error);
            }
        }

        function setupEventListeners() {
            document.getElementById('pause-btn').addEventListener('click', togglePause);
            document.getElementById('next-btn').addEventListener('click', handleNextItem);
            document.getElementById('force-finish-btn').addEventListener('click', handleForceFinish);
            
            // 待機画面の「今すぐ開始」ボタン
            document.getElementById('manual-start-btn').addEventListener('click', async () => {
                const now = new Date();
                const actualStartTimeStr = formatTimeStr(now);
                meetingData.actualStartTime = actualStartTimeStr;
                document.getElementById('actual-start-time').textContent = actualStartTimeStr;

                document.getElementById('start-overlay').classList.add('hidden');
                // ステータスをrunningに更新し、実際の開始時刻も保存
                await updateDoc(doc(db, `users/${currentUser.uid}/records`, recordId), {
                    status: 'running',
                    actualStartTime: actualStartTimeStr
                });
                startTimer();
            });
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            isPaused = false;
            document.getElementById('pause-btn').textContent = "一時停止";
            
            // 初期状態の再計算（過去の進行状況を反映）
            recalculateFutureTimes();
            updateUI();

            timerInterval = setInterval(() => {
                if (!isPaused) {
                    elapsedSecondsCurrentItem++;
                    
                    // ▼ リアルタイム再計算のコアロジック ▼
                    // 現在の項目が割り当てられた時間を超過したら、未来のスケジュールを削り始める
                    const currentAssignedSec = meetingData.items[currentIndex].calculatedTimeSec;
                    if (elapsedSecondsCurrentItem > currentAssignedSec) {
                        recalculateFutureTimes();
                    }
                    
                    updateUI();
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pause-btn');
            const display = document.getElementById('timer-display');
            if (isPaused) {
                btn.textContent = "再開する";
                btn.classList.add('bg-amber-100', 'text-amber-700');
                display.classList.add('timer-pulse');
            } else {
                btn.textContent = "一時停止";
                btn.classList.remove('bg-amber-100', 'text-amber-700');
                display.classList.remove('timer-pulse');
            }
        }

        async function handleNextItem() {
            if (currentIndex >= meetingData.items.length) return;

            meetingData.items[currentIndex].actualTimeSec = elapsedSecondsCurrentItem;
            currentIndex++;
            elapsedSecondsCurrentItem = 0;

            if (currentIndex >= meetingData.items.length) {
                clearInterval(timerInterval);
                await finishMeeting();
                return;
            }

            // 次の項目に移った際、早く終わった(巻いた)分の時間を未来のFlex項目に還元する
            recalculateFutureTimes();
            updateUI();
        }

        async function handleForceFinish() {
            if (!confirm("会議を強制終了しますか？\n現在進行中の議題の時間は記録され、以降の議題は「実績0分」として処理されます。")) {
                return;
            }

            for (let i = currentIndex; i < meetingData.items.length; i++) {
                if (i === currentIndex) {
                    meetingData.items[i].actualTimeSec = elapsedSecondsCurrentItem;
                } else {
                    meetingData.items[i].actualTimeSec = 0;
                }
            }

            clearInterval(timerInterval);
            await finishMeeting();
        }

        // ▼ 未来のスケジュールをリアルタイムで再計算する関数 ▼
        function recalculateFutureTimes() {
            // 現在の項目までの確定消費時間
            let consumedSec = 0;
            for (let i = 0; i < currentIndex; i++) {
                consumedSec += meetingData.items[i].actualTimeSec;
            }
            // 進行中の項目の経過時間も含める
            consumedSec += elapsedSecondsCurrentItem; 

            // 会議全体の残り持ち時間
            let remainingTotalSec = originalTotalSec - consumedSec;

            // 未来(currentIndex + 1以降)の項目の予定合計
            let futureFixSec = 0;
            let futureFlexInitialSec = 0;
            for (let i = currentIndex + 1; i < meetingData.items.length; i++) {
                if (meetingData.items[i].type === 'fix') {
                    futureFixSec += (meetingData.items[i].originalTimeMin * 60);
                } else {
                    futureFlexInitialSec += (meetingData.items[i].originalTimeMin * 60);
                }
            }

            // Flex項目へ分配可能な時間
            let availableFlexSec = remainingTotalSec - futureFixSec;
            let isOverTime = false;

            if (availableFlexSec < 0) {
                availableFlexSec = 0;
                isOverTime = true; // Flexを削りきっても足りない（時間超過）
            }

            // 未来の項目に新しい計算時間をセット
            for (let i = currentIndex + 1; i < meetingData.items.length; i++) {
                const item = meetingData.items[i];
                if (item.type === 'fix') {
                    item.calculatedTimeSec = item.originalTimeMin * 60;
                } else {
                    if (futureFlexInitialSec > 0) {
                        const ratio = (item.originalTimeMin * 60) / futureFlexInitialSec;
                        item.calculatedTimeSec = Math.round(availableFlexSec * ratio);
                    } else {
                        item.calculatedTimeSec = 0;
                    }
                }
            }

            // アラートの表示制御
            const alertBanner = document.getElementById('alert-banner');
            const currentEndLabel = document.getElementById('current-end-label');
            const currentEndTime = document.getElementById('current-end-time');

            if (isOverTime) {
                alertBanner.classList.remove('hidden');
                currentEndLabel.classList.add('text-red-500');
                currentEndTime.classList.remove('text-blue-600');
                currentEndTime.classList.add('text-red-600');
            } else {
                alertBanner.classList.add('hidden');
                currentEndLabel.classList.remove('text-red-500');
                currentEndTime.classList.add('text-blue-600');
                currentEndTime.classList.remove('text-red-600');
            }
        }

        function updateUI() {
            if (currentIndex >= meetingData.items.length) return;

            const currentItem = meetingData.items[currentIndex];
            document.getElementById('current-item-name').textContent = currentItem.name;
            
            if (currentIndex === meetingData.items.length - 1) {
                const nextBtn = document.getElementById('next-btn');
                nextBtn.innerHTML = `会議を終了する <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
                nextBtn.classList.replace('bg-blue-600', 'bg-green-600');
                nextBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
            }

            updateTimerDisplay();
            updateCurrentEndTime();
            updateUpcomingList(); // 秒単位で変動するリストを描画
        }

        function updateTimerDisplay() {
            const currentItem = meetingData.items[currentIndex];
            let remainingSec = currentItem.calculatedTimeSec - elapsedSecondsCurrentItem;
            
            const display = document.getElementById('timer-display');
            if (remainingSec < 0) {
                display.classList.add('timer-over');
                remainingSec = Math.abs(remainingSec);
                display.textContent = "-" + formatSeconds(remainingSec);
            } else {
                display.classList.remove('timer-over');
                display.textContent = formatSeconds(remainingSec);
            }
        }

        function updateCurrentEndTime() {
            // これまでの実績 + 現在の経過時間
            let totalCalcSec = 0;
            for (let i = 0; i < currentIndex; i++) {
                totalCalcSec += meetingData.items[i].actualTimeSec;
            }
            totalCalcSec += elapsedSecondsCurrentItem;
            
            // 現在の項目の計算上の残り時間（まだ超過していない場合のみ加算）
            const currentAssignedSec = meetingData.items[currentIndex].calculatedTimeSec;
            if (elapsedSecondsCurrentItem < currentAssignedSec) {
                totalCalcSec += (currentAssignedSec - elapsedSecondsCurrentItem);
            }

            // 未来の項目の計算上の時間
            for (let i = currentIndex + 1; i < meetingData.items.length; i++) {
                totalCalcSec += meetingData.items[i].calculatedTimeSec;
            }

            // 実際の開始時刻を基準にする（未開始の場合は予定時刻）
            const baseTimeStr = meetingData.actualStartTime || meetingData.startTime;
            const startDt = parseTimeStr(baseTimeStr);
            const currentEndDt = new Date(startDt.getTime() + totalCalcSec * 1000);
            document.getElementById('current-end-time').textContent = formatTimeStr(currentEndDt);
        }

        function updateUpcomingList() {
            const listDiv = document.getElementById('upcoming-list');
            listDiv.innerHTML = '';
            
            if (currentIndex === meetingData.items.length - 1) {
                listDiv.innerHTML = '<p class="text-slate-400 text-sm">次の議題はありません。</p>';
                return;
            }

            for (let i = currentIndex + 1; i < meetingData.items.length; i++) {
                const item = meetingData.items[i];
                // リアルタイム感を出すために秒単位まで表示 (オプションで分単位に戻すことも可能)
                const calcMin = Math.floor(item.calculatedTimeSec / 60);
                const calcSec = item.calculatedTimeSec % 60;
                const originalMin = item.originalTimeMin;
                
                const isReduced = item.calculatedTimeSec < (originalMin * 60);
                const timeColorClass = isReduced ? 'text-amber-600 font-bold' : 'text-slate-700';

                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100';
                div.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-xs px-2 py-1 rounded bg-slate-200 text-slate-600">${item.type === 'fix' ? '固定' : '可変'}</span>
                        <span class="text-sm font-medium text-slate-700">${escapeHtml(item.name)}</span>
                    </div>
                    <div class="text-sm ${timeColorClass} tabular-nums">
                        ${calcMin}分${String(calcSec).padStart(2, '0')}秒 
                        <span class="text-xs text-slate-400 ml-1 font-normal">(予定:${originalMin}分)</span>
                    </div>
                `;
                listDiv.appendChild(div);
            }
        }

        async function finishMeeting() {
            try {
                const docRef = doc(db, `users/${currentUser.uid}/records`, recordId);
                await updateDoc(docRef, {
                    items: meetingData.items,
                    status: 'completed',
                    completedAt: new Date()
                });
                window.location.href = `history.html?id=${recordId}`;
            } catch (error) {
                console.error("更新エラー:", error);
                alert("データの保存に失敗しました。");
            }
        }

        function formatSeconds(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function parseTimeStr(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const dt = new Date();
            dt.setHours(hours, minutes, 0, 0);
            return dt;
        }

        function formatTimeStr(dateObj) {
            return `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return escape[match];
            });
        }
    </script>
</body>
</html>
